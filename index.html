<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS TERMINAL v2.6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ============================================================
   NEXUS TERMINAL — v2.6 "MADURACIÓN"
   Optimización profunda de CSS sobre la base v2.5.
   No toca HTML ni JS. Reemplaza el bloque <style> completo.
   ============================================================ */

/* ============================================================
   1. VARIABLES — fuente única de verdad para todo el color
   ============================================================ */
:root {
  /* paleta base */
  --nexus-purple: #9D00FF;
  --nexus-purple-soft: #D9A3FF;
  --monitor-green: #00FF41;
  --tech-blue: #2faaff;
  --alert-red: #FF1B3A;
  --alert-red-dim: #660000;
  --warn-yellow: #FFD500;
  --warn-orange: #FF9900;

  --deep-black: #050505;
  --dark-gray: #111111;
  --panel-gray: #0C0C0C;
  --mid-gray: #2E2E2E;
  --line-gray: #222222;
  --steel: #404040;
  --dirty-white: #ECECEC;
  --muted-white: #CCCCCC;

  /* derivados de opacidad (uso repetido en overlays/vidrio/bordes) */
  --purple-glow-soft: rgba(157, 0, 255, 0.3);
  --purple-glow-mid: rgba(157, 0, 255, 0.5);
  --purple-glow-strong: rgba(157, 0, 255, 0.6);
  --red-glow-mid: rgba(255, 27, 58, 0.5);
  --red-glow-strong: rgba(255, 27, 58, 0.9);
  --green-glow: rgba(0, 255, 65, 0.5);
  --white-hair: rgba(255, 255, 255, 0.15);
  --white-hair-strong: rgba(255, 255, 255, 0.35);
  --glass-tint: rgba(12, 12, 12, 0.72);

  /* geometría / ritmo compartido */
  --terminal-h: 200px;
  --crt-tilt: perspective(1100px) rotateX(1.8deg) rotateY(-1.2deg);
  --radius-sm: 2px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: var(--deep-black);
  color: var(--dirty-white);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  -webkit-font-smoothing: none;
  font-smooth: never;
  overflow: hidden;
}

::selection { background: var(--nexus-purple); color: var(--deep-black); }

/* ============================================================
   2. CRT WRAPPER
   ============================================================ */
.crt-wrap {
  position: fixed; inset: 0;
  transform: var(--crt-tilt);
  transform-origin: center center;
}

/* ============================================================
   3. CAPAS DE FONDO
   ============================================================ */
.bg-hex {
  position: fixed; inset: 0; z-index: 0;
  background-repeat: repeat; opacity: 0.08;
  pointer-events: none;
}

.data-stream { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.data-char {
  position: absolute; bottom: -20px;
  color: var(--monitor-green);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-shadow: 0 0 4px var(--green-glow);
  animation-name: rise; animation-timing-function: linear; animation-iteration-count: infinite;
}

/* --- Polvo digital: campo de partículas 100% CSS, sin tocar el DOM --- */
body::before,
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: transparent;
  z-index: 1;
  pointer-events: none;
  will-change: transform;
}
body::before {
  box-shadow:
    41vw 38vh 0 0 rgba(157,0,255,0.46),
    68vw 24vh 0 0 rgba(157,0,255,0.45),
    64vw 54vh 0 0 rgba(157,0,255,0.31),
    8vw 61vh 0 0 rgba(157,0,255,0.34),
    72vw 31vh 0 0 rgba(0,255,65,0.68),
    74vw 15vh 0 0 rgba(157,0,255,0.53),
    28vw 11vh 0 0 rgba(157,0,255,0.52),
    53vw 36vh 0 0 rgba(0,255,65,0.52),
    71vw 174vh 0 0 rgba(0,255,65,0.37),
    81vw 48vh 0 0 rgba(157,0,255,0.45),
    8vw 144vh 0 0 rgba(157,0,255,0.32),
    87vw 136vh 0 0 rgba(157,0,255,0.47),
    74vw 116vh 0 0 rgba(157,0,255,0.44),
    23vw 178vh 0 0 rgba(157,0,255,0.61),
    38vw 134vh 0 0 rgba(157,0,255,0.5),
    57vw 73vh 0 0 rgba(157,0,255,0.54),
    65vw 107vh 0 0 rgba(157,0,255,0.37),
    62vw 107vh 0 0 rgba(0,255,65,0.32),
    97vw 142vh 0 0 rgba(0,255,65,0.53),
    40vw 87vh 0 0 rgba(0,255,65,0.58),
    74vw 116vh 0 0 rgba(157,0,255,0.33),
    34vw 121vh 0 0 rgba(157,0,255,0.58),
    93vw 179vh 0 0 rgba(0,255,65,0.42),
    87vw 114vh 0 0 rgba(157,0,255,0.41),
    85vw 88vh 0 0 rgba(157,0,255,0.31),
    21vw 156vh 0 0 rgba(157,0,255,0.35);
  animation: dust-rise 22s linear infinite;
}
body::after {
  width: 4px; height: 4px;
  box-shadow:
    98vw 73vh 0 0 rgba(157,0,255,0.35),
    50vw 127vh 0 0 rgba(157,0,255,0.33),
    70vw 71vh 0 0 rgba(0,255,65,0.65),
    70vw 71vh 0 0 rgba(0,255,65,0.58),
    87vw 97vh 0 0 rgba(157,0,255,0.68),
    22vw 38vh 0 0 rgba(157,0,255,0.39),
    62vw 150vh 0 0 rgba(157,0,255,0.37),
    18vw 107vh 0 0 rgba(0,255,65,0.51),
    40vw 32vh 0 0 rgba(157,0,255,0.58),
    79vw 167vh 0 0 rgba(157,0,255,0.57),
    99vw 174vh 0 0 rgba(157,0,255,0.62),
    51vw 100vh 0 0 rgba(0,255,65,0.34),
    7vw 48vh 0 0 rgba(157,0,255,0.33),
    20vw 28vh 0 0 rgba(157,0,255,0.44),
    0vw 145vh 0 0 rgba(157,0,255,0.36),
    46vw 157vh 0 0 rgba(0,255,65,0.31),
    78vw 96vh 0 0 rgba(157,0,255,0.36),
    44vw 154vh 0 0 rgba(157,0,255,0.45),
    62vw 119vh 0 0 rgba(157,0,255,0.49),
    18vw 26vh 0 0 rgba(0,255,65,0.6),
    61vw 177vh 0 0 rgba(157,0,255,0.36),
    67vw 92vh 0 0 rgba(157,0,255,0.36),
    3vw 194vh 0 0 rgba(0,255,65,0.51),
    11vw 178vh 0 0 rgba(157,0,255,0.64);
  animation: dust-rise 28s linear infinite;
  animation-delay: -6s;
}

.bg-orb-wrap {
  position: fixed; left: 0; top: 36px; bottom: var(--terminal-h);
  width: 52vw; z-index: 2; pointer-events: none;
}
#orbCanvas { width: 100%; height: 100%; display: block; }
.orb-halo {
  position: absolute; top: 50%; left: 50%;
  width: 340px; height: 340px; margin: -170px 0 0 -170px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--purple-glow-mid) 0%, rgba(157, 0, 255, 0.12) 45%, transparent 70%);
  animation: halo-pulse 3s ease-in-out infinite;
  pointer-events: none;
  transition: background 0.15s steps(3), box-shadow 0.15s steps(3);
  box-shadow: 0 0 60px var(--purple-glow-strong);
}
.crisis .orb-halo {
  background: radial-gradient(circle, var(--red-glow-mid) 0%, rgba(255, 27, 58, 0.15) 45%, transparent 70%);
  box-shadow: 0 0 100px var(--red-glow-strong);
}
.orb-label {
  position: absolute; top: calc(50% + 190px); left: 50%; transform: translateX(-50%);
  font-family: 'VT323', monospace; color: var(--nexus-purple);
  font-size: 20px; letter-spacing: 3px;
  text-shadow: 0 0 8px var(--purple-glow-strong);
}
.crisis .orb-label {
  color: var(--alert-red);
  text-shadow: 0 0 8px var(--red-glow-strong);
}

/* ============================================================
   4. OVERLAYS CRT
   ============================================================ */
.bg-scanlines {
  position: fixed; inset: 0; z-index: 80; pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(255, 255, 255, 0.025) 3px
  );
  opacity: 0.5;
  mix-blend-mode: overlay;
}

.bg-blur-lines { position: fixed; inset: 0; z-index: 79; pointer-events: none; }
.bg-blur-lines div {
  position: absolute; left: 0; right: 0; height: 1px;
  background: rgba(255, 255, 255, 0.04); filter: blur(1.5px);
}

.bg-noise {
  position: fixed; inset: 0; z-index: 81; pointer-events: none;
  opacity: 0.08;
  mix-blend-mode: soft-light;
}

.bg-vignette {
  position: fixed; inset: 0; z-index: 82; pointer-events: none;
  background: radial-gradient(
    ellipse at center,
    transparent 35%,
    rgba(0, 0, 0, 0.8) 100%
  );
}

.chroma-edge {
  position: fixed; top: 0; bottom: 0; width: 40px;
  z-index: 83; pointer-events: none; mix-blend-mode: screen;
}
.chroma-edge.left {
  left: 0;
  background: linear-gradient(to right, rgba(255, 0, 60, 0.22), transparent);
  transform: translateX(-1px);
}
.chroma-edge.right {
  right: 0;
  background: linear-gradient(to left, rgba(0, 80, 255, 0.22), transparent);
  transform: translateX(1px);
}

.brightness-flicker {
  position: fixed; inset: 0; z-index: 84; pointer-events: none;
  background: #fff; opacity: 0;
}

/* ============================================================
   5. GLITCH BLOCK — falla de señal VGA agresiva
   ============================================================ */
.glitch-block {
  position: fixed; z-index: 90; pointer-events: none;
  opacity: 0; overflow: hidden;
  animation: glitch-shift 900ms ease-in-out infinite;
}
.glitch-block .base {
  position: absolute; inset: 0;
  background: rgba(200, 200, 220, 0.15);
}
.glitch-block .red {
  position: absolute; inset: 0;
  background: rgba(255, 0, 60, 0.4);
  mix-blend-mode: screen;
  transform: translateX(-4px);
}
.glitch-block .blue {
  position: absolute; inset: 0;
  background: rgba(0, 90, 255, 0.4);
  mix-blend-mode: screen;
  transform: translateX(4px);
}

/* ============================================================
   6. EMERGENCY OVERLAY
   ============================================================ */
.emergency-overlay {
  position: fixed; inset: 0; z-index: 95; pointer-events: none;
  background: rgba(255, 27, 58, 0.18); opacity: 0;
  transition: opacity 0.4s;
}
body.crisis .emergency-overlay { opacity: 1; }

.emergency-msg {
  position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
  z-index: 96; font-family: 'VT323', monospace; color: var(--alert-red);
  font-size: 68px; letter-spacing: 6px;
  text-shadow: 0 0 30px var(--red-glow-strong);
  opacity: 0; pointer-events: none;
  animation: crit-blink 0.9s steps(1) infinite;
  display: none;
}
body.crisis .emergency-msg { display: block; }

/* ============================================================
   7. COMMAND PULSE
   ============================================================ */
.cmd-pulse {
  position: fixed; z-index: 97; pointer-events: none;
  border-radius: 50%;
  box-shadow: 0 0 80px var(--nexus-purple);
  background: radial-gradient(circle, var(--purple-glow-mid), transparent 70%);
  width: 40px; height: 40px; opacity: 0; transform: scale(0);
}

/* ============================================================
   8. TOP BAR
   ============================================================ */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 36px; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  background: linear-gradient(145deg, #1A1A1A, #2D2D2D, #3A3A3A, #1A1A1A);
  border-bottom: 1px solid var(--white-hair-strong);
}
body.crisis .top-bar { border-bottom-color: var(--alert-red); }
.top-bar .title {
  font-family: 'VT323', monospace; color: var(--nexus-purple);
  font-size: 22px; letter-spacing: 2px;
  text-shadow: 0 0 6px var(--purple-glow-mid);
}
body.crisis .top-bar .title {
  color: var(--alert-red);
  text-shadow: 0 0 6px rgba(255, 27, 58, 0.7);
}
.top-bar .right { display: flex; align-items: center; gap: 16px; }
.clock {
  font-family: 'JetBrains Mono', monospace; color: var(--tech-blue);
  font-size: 13px; letter-spacing: 1px;
}
.sound-toggle {
  cursor: pointer; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--mid-gray); background: var(--dark-gray);
  color: var(--dirty-white); font-size: 14px; user-select: none;
}
.sound-toggle.on {
  color: var(--nexus-purple); border-color: var(--nexus-purple);
  box-shadow: 0 0 6px var(--purple-glow-mid);
}

/* ============================================================
   9. LAYOUT / STAGE
   ============================================================ */
.stage {
  position: fixed; top: 36px; left: 0; right: 0; bottom: var(--terminal-h);
  z-index: 10; overflow: hidden;
}

/* ============================================================
   10. VENTANAS — metal cepillado + vidrio esmerilado
   ============================================================ */
.win {
  position: absolute;
  background: var(--glass-tint);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border: 1px solid var(--white-hair-strong);
  outline: 1px solid rgba(255, 255, 255, 0.08);
  outline-offset: 4px;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.04),
    0 10px 30px rgba(0, 0, 0, 0.45),
    0 0 4px var(--purple-glow-soft);
  display: flex; flex-direction: column;
  min-width: 220px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
body.crisis .win {
  border-color: var(--alert-red);
  outline-color: rgba(255, 27, 58, 0.3);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.04),
    0 10px 30px rgba(0, 0, 0, 0.45),
    0 0 4px rgba(255, 27, 58, 0.3);
}
.win.hidden { display: none; }
.win.maximized {
  position: fixed !important;
  top: 36px !important; left: 0 !important; right: 0 !important;
  bottom: var(--terminal-h) !important;
  width: auto !important; height: auto !important;
  z-index: 200;
}
.win.minimized .win-body { display: none; }

.screw {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ccc, #444 70%, #111);
  z-index: 2;
}
.screw.tl { top: 2px; left: 2px; }
.screw.tr { top: 2px; right: 2px; }
.screw.bl { bottom: 2px; left: 2px; }
.screw.br { bottom: 2px; right: 2px; }

.win-title {
  font-family: 'VT323', monospace; color: var(--nexus-purple);
  font-size: 18px; letter-spacing: 1.5px;
  padding: 4px 10px;
  background: linear-gradient(to bottom, #232323, #191919);
  border-bottom: 1px solid var(--white-hair);
  display: flex; align-items: center; justify-content: space-between;
  cursor: grab; user-select: none;
}
body.crisis .win-title { color: var(--alert-red); }
.win-title:active { cursor: grabbing; }

.win-controls { display: flex; gap: 4px; }
.win-btn {
  cursor: pointer; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--mid-gray); color: var(--dirty-white);
}
.win-btn.close { color: var(--alert-red); }
.win-btn:hover { border-color: currentColor; }

.win-body {
  padding: 8px 10px; overflow: auto; font-size: 12px;
  flex: 1; position: relative;
}

.win-ghost {
  position: absolute; pointer-events: none; z-index: 5;
  border: 1px solid var(--nexus-purple);
  background: rgba(157, 0, 255, 0.05);
}

/* ============================================================
   11. FLUX
   ============================================================ */
#win-flux { top: 10px; right: 10px; width: 360px; height: 240px; }
#win-flux .win-body {
  font-family: 'JetBrains Mono', monospace; color: var(--monitor-green);
  font-size: 11px; line-height: 1.6;
  background: #070707;
  box-shadow: inset 0 0 14px rgba(0, 0, 0, 0.9);
  display: flex; flex-direction: column-reverse;
  mask-image: linear-gradient(to top, transparent 0%, black 20%);
  -webkit-mask-image: linear-gradient(to top, transparent 0%, black 20%);
}
.flux-line {
  white-space: pre-wrap; word-break: break-word; margin-top: 2px;
}
.flux-line .ts { color: var(--tech-blue); }
.flux-line .type-alert {
  color: var(--alert-red);
  text-shadow: 0 0 5px var(--alert-red);
}
.flux-line .type-mission { color: var(--nexus-purple); }
.flux-line .type-agent { color: var(--monitor-green); }

/* ============================================================
   12. AEGIS — anillos + número central con pulso sincronizado
   ============================================================ */
#win-aegis { top: 260px; right: 10px; width: 360px; height: 210px; }
#win-aegis .win-body {
  display: flex; align-items: center; justify-content: center; gap: 14px;
}
.aegis-pct {
  font-family: 'VT323', monospace; font-size: 68px;
  text-shadow: 0 0 12px currentColor;
  animation: aegis-pulse 2s ease-in-out infinite;
  transform-origin: center;
}
.aegis-label {
  font-size: 10px; color: var(--dirty-white); letter-spacing: 1px;
}

.ring-shake {
  animation: ringshake 0.15s linear infinite;
  transform-origin: 75px 75px;
}

/* ============================================================
   13. NEXUS — tarjetas de agente + radar con pulso
   ============================================================ */
#win-nexus { left: 10px; right: 390px; bottom: 10px; height: 230px; }
#win-nexus .win-body {
  display: flex; gap: 10px; overflow-x: auto; padding: 10px;
}
.agent-card {
  position: relative; flex: 1 0 190px;
  background: #070707; padding: 8px;
  font-family: 'JetBrains Mono', monospace;
  border: 3px solid var(--white-hair);
  border-image: linear-gradient(155deg, #4a4a4a, #1a1a1a 40%, #4a4a4a 60%, #1a1a1a) 1;
  outline: 1px solid rgba(255, 255, 255, 0.04);
  outline-offset: 2px;
  box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
}
.agent-card .name { font-size: 12px; color: var(--dirty-white); font-weight: 700; }
.agent-card .ver { font-size: 10px; color: var(--mid-gray); margin-bottom: 4px; }
.agent-status {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; margin-bottom: 6px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--monitor-green);
}
.dot.online {
  animation: pulse-dot 1.4s ease-in-out infinite;
  box-shadow: 0 0 6px var(--monitor-green);
}
.dot.offline {
  background: var(--alert-red);
  box-shadow: 0 0 6px var(--alert-red);
  animation: none;
}

.agent-card svg polygon:last-of-type {
  animation: radar-pulse 2s ease-in-out infinite;
  transform-origin: center;
}

/* ============================================================
   14. DECK — tabla + barras de progreso
   ============================================================ */
#win-deck { right: 10px; bottom: 10px; width: 360px; height: 230px; }
#win-deck .win-body { padding-bottom: 58px; }
#win-deck table {
  width: 100%; border-collapse: collapse;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
}
#win-deck th {
  text-align: left; color: var(--tech-blue);
  border-bottom: 1px solid var(--mid-gray); padding: 3px 4px;
}
#win-deck td {
  padding: 3px 4px; border-bottom: 1px solid var(--line-gray);
  color: var(--dirty-white);
}
.status-pending { color: var(--dirty-white); }
.status-in_progress { color: var(--tech-blue); }
.status-completed { color: var(--monitor-green); }

#win-deck .win-body::before {
  content: 'PROGRESO DE MISIONES';
  position: absolute; left: 4px; bottom: 46px;
  font-size: 9px; letter-spacing: 1px; color: var(--muted-white);
  opacity: 0.7;
}
#win-deck .win-body::after {
  content: '';
  position: absolute; left: 4px; right: 4px; bottom: 8px;
  height: 34px;
  border-radius: var(--radius-sm);
  background-repeat: no-repeat;
  background-size:
    100% 8px,
    42% 8px, 100% 8px,
    100% 8px;
  background-position:
    0 0,
    0 16px, 0 16px,
    0 32px;
  background-image:
    linear-gradient(to right, var(--monitor-green), var(--monitor-green)),
    linear-gradient(to right, var(--tech-blue), var(--tech-blue)),
    linear-gradient(to right, var(--mid-gray), var(--mid-gray)),
    linear-gradient(to right, var(--mid-gray), var(--mid-gray));
}
.deck-bar-glow {
  position: absolute; left: 4px; bottom: 24px;
  width: 42%; max-width: calc(100% - 8px); height: 8px;
  border-radius: var(--radius-sm);
  pointer-events: none;
  animation: deck-bar-glow 1.8s ease-in-out infinite;
}

/* ============================================================
   15. TASKBAR
   ============================================================ */
.taskbar {
  position: fixed; left: 10px; bottom: calc(var(--terminal-h) + 6px);
  z-index: 60; display: flex; gap: 6px;
}
.taskbar-item {
  width: 200px; height: 30px;
  background: var(--dark-gray); border: 1px solid var(--white-hair);
  color: var(--nexus-purple); font-family: 'VT323', monospace;
  font-size: 15px; display: none; align-items: center;
  padding: 0 8px; cursor: pointer;
}
.taskbar-item.show { display: flex; }

/* ============================================================
   16. TERMINAL
   ============================================================ */
.terminal {
  position: fixed; left: 0; right: 0; bottom: 0;
  height: var(--terminal-h); z-index: 1000;
  background: #080808;
  border-top: 3px solid var(--nexus-purple);
  box-shadow: 0 -6px 30px var(--purple-glow-soft);
  display: flex; flex-direction: column;
  transition: border-color 0.3s;
}
body.crisis .terminal {
  border-top-color: var(--alert-red);
  box-shadow: 0 -6px 30px rgba(255, 27, 58, 0.3);
}
.terminal-output {
  flex: 1; overflow-y: auto; padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--monitor-green); line-height: 1.5;
  position: relative;
}
.terminal-output .cmd-echo { color: var(--dirty-white); }
.terminal-output .cmd-echo .prompt { color: var(--nexus-purple); }

.sweep-line { position: relative; overflow: hidden; }
.sweep-line::before {
  content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 0%;
  background: linear-gradient(to right, var(--purple-glow-mid), transparent);
  animation: sweep 300ms ease-out forwards;
}

.terminal-input-row {
  display: flex; align-items: center; padding: 6px 12px;
  border-top: 1px solid var(--mid-gray);
  font-family: 'JetBrains Mono', monospace; position: relative;
}
.terminal-prompt {
  color: var(--nexus-purple); margin-right: 8px; font-size: 14px;
  text-shadow: 0 0 4px var(--purple-glow-strong);
}
.terminal-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--monitor-green); font-family: 'JetBrains Mono', monospace;
  font-size: 14px; caret-color: var(--monitor-green);
  text-shadow: 0 0 4px rgba(0, 255, 65, 0.7);
}
.terminal-cursor {
  width: 8px; height: 16px; background: var(--monitor-green);
  animation: blink 500ms steps(1) infinite; margin-left: 2px;
}

.suggest-line {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--tech-blue); padding: 0 12px 4px;
}

/* ============================================================
   17. SCROLLBARS
   ============================================================ */
.win-body::-webkit-scrollbar, .terminal-output::-webkit-scrollbar { width: 6px; }
.win-body::-webkit-scrollbar-thumb, .terminal-output::-webkit-scrollbar-thumb {
  background: var(--mid-gray);
}
.win-body, .terminal-output {
  scrollbar-width: thin;
  scrollbar-color: var(--mid-gray) transparent;
}

/* ============================================================
   18. RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .bg-orb-wrap { display: none; }
  #win-nexus { right: 10px; }
  #win-deck { position: static; margin: 0 10px 10px; }
}

@media (prefers-reduced-motion: reduce) {
  body::before, body::after,
  .glitch-block, .orb-halo, .aegis-pct,
  .agent-card svg polygon:last-of-type,
  .deck-bar-glow, .dot.online {
    animation: none !important;
  }
}

/* ============================================================
   19. KEYFRAMES — todas las animaciones, en un único bloque
   ============================================================ */
@keyframes rise {
  from { transform: translateY(0); }
  to { transform: translateY(-115vh); }
}

@keyframes dust-rise {
  from { transform: translateY(0) translateX(0); }
  25%  { transform: translateY(-25vh) translateX(6px); }
  50%  { transform: translateY(-50vh) translateX(-6px); }
  75%  { transform: translateY(-75vh) translateX(6px); }
  to   { transform: translateY(-100vh) translateX(0); }
}

@keyframes halo-pulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.15); opacity: 1; }
}

@keyframes glitch-shift {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-15px); }
  45%  { transform: translateX(8px); }
  65%  { transform: translateX(-6px); }
  80%  { transform: translateX(15px); }
  100% { transform: translateX(0); }
}

@keyframes crit-blink {
  50% { opacity: 0; }
  0%, 100% { opacity: 1; }
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.35); opacity: 0.6; }
}

@keyframes ringshake {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(1px, -1px); }
  50% { transform: translate(-1px, 1px); }
  75% { transform: translate(1px, 1px); }
}

@keyframes aegis-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

@keyframes radar-pulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

@keyframes deck-bar-glow {
  0%, 100% { box-shadow: 0 0 4px 1px var(--tech-blue); opacity: 0.6; }
  50% { box-shadow: 0 0 10px 3px var(--tech-blue); opacity: 1; }
}

@keyframes alert-blink {
  0%, 49% { color: var(--alert-red); text-shadow: 0 0 8px var(--alert-red); }
  50%, 100% { color: var(--alert-red-dim); text-shadow: none; }
}

@keyframes sweep {
  from { width: 0%; }
  to { width: 100%; }
}

@keyframes blink { 50% { opacity: 0; } }
</style>

<script>
(function(){
"use strict";

/* ===================== DATOS MOCKEADOS ===================== */
const agents = [
  { name:"scraper-v1", status:"online", vigor:87, latencia:45, throughput:72, integridad:95 },
  { name:"sniffer-v1", status:"online", vigor:92, latencia:23, throughput:88, integridad:90 },
  { name:"guardian-v1", status:"online", vigor:99, latencia:10, throughput:60, integridad:99 },
  { name:"kis-v1", status:"offline", vigor:0, latencia:0, throughput:0, integridad:0 }
];

const missions = [
  { id:"#A1", agent:"scraper-v1", action:"scrape target", status:"completed" },
  { id:"#A2", agent:"sniffer-v1", action:"monitor eth0", status:"in_progress" },
  { id:"#A3", agent:"guardian-v1", action:"verify integrity", status:"pending" }
];

const events = [
  { ts:"04:15:22", type:"AGENT", msg:"scraper-v1 registered" },
  { ts:"04:15:23", type:"AGENT", msg:"sniffer-v1 registered" },
  { ts:"04:15:24", type:"AGENT", msg:"guardian-v1 registered" },
  { ts:"04:15:30", type:"MISSION", msg:"#A1 assigned to scraper-v1" },
  { ts:"04:16:00", type:"MISSION", msg:"#A1 completed" },
  { ts:"04:16:10", type:"ALERT", msg:"kis-v1 heartbeat lost" }
];

/* ===================== ESTADO GLOBAL ===================== */
let crisisMode = false;
let crisisAuto = false;

function nowTs(){ return new Date().toTimeString().slice(0,8); }

/* ===================== RELOJ ERRÁTICO ===================== */
const clockEl = document.getElementById('clock');
function tickClock(){ clockEl.textContent = nowTs(); }
tickClock();
setInterval(tickClock, 1000);

function scheduleClockFlicker(){
  const delay = 1000 + Math.random()*2000;
  setTimeout(()=>{
    clockEl.style.opacity = (0.3 + Math.random()*0.4).toFixed(2);
    clockEl.style.transform = `skewX(${(Math.random()*10-5).toFixed(1)}deg)`;
    setTimeout(()=>{ clockEl.style.opacity = '1'; clockEl.style.transform = 'none'; }, 80 + Math.random()*80);
    scheduleClockFlicker();
  }, delay);
}
scheduleClockFlicker();

/* ===================== FONDO HEXAGONAL ===================== */
(function buildHexBg(){
  const hexSvg = `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='104' viewBox='0 0 60 104'>
    <g fill='none' stroke='%232D2D2D' stroke-width='1'>
      <path d='M30 0 L60 17.3 L60 52 L30 69.3 L0 52 L0 17.3 Z'/>
      <path d='M30 34.7 L60 52 L60 86.7 L30 104 L0 86.7 L0 52 Z'/>
    </g>
  </svg>`;
  const uri = "data:image/svg+xml," + encodeURIComponent(hexSvg);
  const el = document.querySelector('.bg-hex');
  el.style.backgroundImage = `url("${uri}")`;
  el.style.backgroundSize = '60px 104px';
})();

/* ===================== RUIDO INTENSO ===================== */
(function buildNoise(){
  const noiseSvg = `<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'>
    <filter id='n'>
      <feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/>
      <feColorMatrix type='saturate' values='0'/>
    </filter>
    <rect width='100%' height='100%' filter='url(%23n)'/>
  </svg>`;
  const uri = "data:image/svg+xml," + encodeURIComponent(noiseSvg);
  const el = document.getElementById('bgNoise');
  el.style.backgroundImage = `url("${uri}")`;
  el.style.backgroundSize = '140px 140px';
})();

/* ===================== LINEAS DE DESENFOQUE CADA 100px ===================== */
(function buildBlurLines(){
  const wrap = document.getElementById('blurLines');
  const count = Math.ceil(window.innerHeight / 100);
  for(let i=0;i<count;i++){
    const d = document.createElement('div');
    d.style.top = (i*100) + 'px';
    wrap.appendChild(d);
  }
})();

/* ===================== PARTICULAS DE DATOS (HEX STREAM) ===================== */
(function buildDataStream(){
  const chars = "0123456789ABCDEF{}[]<>/\\|";
  const wrap = document.getElementById('dataStream');
  const count = 20;
  for(let i=0;i<count;i++){
    const span = document.createElement('span');
    span.className = 'data-char';
    span.textContent = chars[Math.floor(Math.random()*chars.length)];
    const speed = 6 + Math.random()*10;
    span.style.left = Math.random()*100 + 'vw';
    span.style.opacity = (0.3 + Math.random()*0.4).toFixed(2);
    span.style.animationDuration = speed + 's';
    span.style.animationDelay = (-Math.random()*speed) + 's';
    wrap.appendChild(span);
    setInterval(()=>{
      span.textContent = chars[Math.floor(Math.random()*chars.length)];
    }, 800 + Math.random()*1200);
  }
})();

/* ===================== ORBE 3D (Three.js) ===================== */
let orbGroup, orbSphere, orbRings = [], orbParticles, orbRenderer, orbScene, orbCamera;
(function initOrb(){
  const canvas = document.getElementById('orbCanvas');
  const wrap = canvas.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;

  orbScene = new THREE.Scene();
  orbCamera = new THREE.PerspectiveCamera(50, w/h, 0.1, 1000);
  orbCamera.position.z = 5.5;

  orbRenderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  orbRenderer.setSize(w, h);
  orbRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  orbGroup = new THREE.Group();
  orbScene.add(orbGroup);

  const geo = new THREE.IcosahedronGeometry(1.5, 2);
  const mat = new THREE.MeshBasicMaterial({ color:0x9D00FF, wireframe:true, transparent:true, opacity:0.85 });
  orbSphere = new THREE.Mesh(geo, mat);
  orbGroup.add(orbSphere);

  const ringGeo = new THREE.TorusGeometry(2.5, 0.02, 8, 90);
  const ringMatOuter = new THREE.MeshBasicMaterial({ color:0x9D00FF, transparent:true, opacity:0.7 });
  const ringMatGlow = new THREE.MeshBasicMaterial({ color:0xD9A3FF, transparent:true, opacity:0.35 });
  function makeRing(){
    const g = new THREE.Group();
    g.add(new THREE.Mesh(ringGeo, ringMatOuter.clone()));
    const inner = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.05, 6, 60), ringMatGlow.clone());
    g.add(inner);
    return g;
  }
  const rx = makeRing(), ry = makeRing(), rz = makeRing();
  ry.rotation.x = Math.PI/2;
  rz.rotation.y = Math.PI/2;
  orbGroup.add(rx, ry, rz);
  orbRings = [rx, ry, rz];

  const pCount = 120;
  const positions = new Float32Array(pCount*3);
  const orbitSpeeds = new Float32Array(pCount);
  const orbitRadii = new Float32Array(pCount);
  const orbitPhase = new Float32Array(pCount);
  for(let i=0;i<pCount;i++){
    const r = 2.4 + Math.random()*0.8;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    orbitRadii[i] = r;
    orbitPhase[i] = theta;
    orbitSpeeds[i] = 0.15 + Math.random()*0.35;
    positions[i*3] = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = r*Math.cos(phi);
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const pMat = new THREE.PointsMaterial({ color:0xB84DFF, size:0.05, transparent:true, opacity:0.9 });
  orbParticles = new THREE.Points(pGeo, pMat);
  orbGroup.add(orbParticles);
  orbParticles.userData = { orbitRadii, orbitPhase, orbitSpeeds, pCount };

  window.addEventListener('resize', ()=>{
    const w2 = wrap.clientWidth, h2 = wrap.clientHeight;
    orbCamera.aspect = w2/h2;
    orbCamera.updateProjectionMatrix();
    orbRenderer.setSize(w2, h2);
  });

  let t = 0;
  const posAttr = orbParticles.geometry.attributes.position;
  function animate(){
    requestAnimationFrame(animate);
    t += 0.016;
    const speedFactor = crisisMode ? 3 : 1;
    orbSphere.rotation.y += 0.0038*speedFactor;
    orbSphere.rotation.x += 0.0021*speedFactor;
    orbSphere.rotation.z += 0.0012*speedFactor;
    orbRings[0].rotation.z += 0.006*speedFactor;
    orbRings[1].rotation.y -= 0.009*speedFactor;
    orbRings[2].rotation.x += 0.0045*speedFactor;

    for(let i=0;i<pCount;i++){
      const phase = orbitPhase[i] + t*orbitSpeeds[i]*speedFactor;
      const r = orbitRadii[i];
      posAttr.array[i*3] = r*Math.cos(phase);
      posAttr.array[i*3+2] = r*Math.sin(phase);
    }
    posAttr.needsUpdate = true;

    const color = crisisMode ? 0xFF0033 : 0x9D00FF;
    orbSphere.material.color.setHex(color);
    orbRings.forEach(g=>g.children.forEach(m=>m.material.color.setHex(crisisMode?0xFF0033:(m.material.opacity>0.5?0x9D00FF:0xD9A3FF))));
    orbRenderer.render(orbScene, orbCamera);
  }
  animate();
})();

/* ===================== FLICKER DE BRILLO (2-5s) ===================== */
function scheduleBrightnessFlicker(){
  const delay = 1500 + Math.random()*2000;
  setTimeout(()=>{
    const layer = document.getElementById('brightnessFlicker');
    layer.style.opacity = (Math.random()*0.04).toFixed(3);
    setTimeout(()=>{ layer.style.opacity = '0'; }, 60 + Math.random()*40);
    scheduleBrightnessFlicker();
  }, delay);
}
scheduleBrightnessFlicker();

/* ===================== GLITCH AGRESIVO (VGA roto) ===================== */
function scheduleGlitch(){
  const delay = 3000 + Math.random()*3000;
  setTimeout(()=>{
    const block = document.getElementById('glitchBlock');
    const w = 200 + Math.random()*200;
    const h = 15 + Math.random()*35;
    block.style.left = Math.random()*(window.innerWidth - w) + 'px';
    block.style.top = (36 + Math.random()*(window.innerHeight - 36 - 200 - h)) + 'px';
    block.style.width = w + 'px';
    block.style.height = h + 'px';
    block.style.opacity = '0.9';
    block.style.transform = `translateX(${(Math.random()*40-20).toFixed(0)}px)`;
    playGlitchBeep();
    setTimeout(()=>{ block.style.opacity = '0'; }, 150 + Math.random()*100);
    scheduleGlitch();
  }, delay);
}
scheduleGlitch();

/* ===================== AUDIO ===================== */
let audioCtx = null, soundOn = false;
let ambientNodes = null, alarmNode = null;

function ensureCtx(){ if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } return audioCtx; }

function playClick(){
  if(!soundOn) return;
  const ctx = ensureCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'square'; o.frequency.value = 1200;
  g.gain.setValueAtTime(0.04, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.03);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.03);
}
function playAlert(){
  if(!soundOn) return;
  const ctx = ensureCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sawtooth'; o.frequency.value=660;
  g.gain.setValueAtTime(0.06, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.35);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.35);
}
function playGlitchBeep(){
  if(!soundOn) return;
  const ctx = ensureCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='square'; o.frequency.value = 800 + Math.random()*400;
  g.gain.setValueAtTime(0.045, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.07);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.07);
}
function playScanner(){
  if(!soundOn) return;
  const ctx = ensureCtx();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(300, ctx.currentTime);
  o.frequency.linearRampToValueAtTime(900, ctx.currentTime+0.4);
  g.gain.setValueAtTime(0.05, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+0.4);
}

function startAmbient(){
  const ctx = ensureCtx();
  const hum = ctx.createOscillator(); const humGain = ctx.createGain();
  hum.type='sine'; hum.frequency.value=60; humGain.gain.value=0.03;
  hum.connect(humGain); humGain.connect(ctx.destination); hum.start();

  const bufferSize = 2*ctx.sampleRate;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
  const noise = ctx.createBufferSource();
  noise.buffer = buffer; noise.loop = true;
  const noiseGain = ctx.createGain(); noiseGain.gain.value = 0.04;
  noise.connect(noiseGain); noiseGain.connect(ctx.destination); noise.start();

  ambientNodes = { hum, humGain, noise, noiseGain };
}
function stopAmbient(){
  if(ambientNodes){
    const t = audioCtx.currentTime;
    ambientNodes.humGain.gain.setTargetAtTime(0, t, 0.2);
    ambientNodes.noiseGain.gain.setTargetAtTime(0, t, 0.2);
    ambientNodes.hum.stop(t+0.5);
    ambientNodes.noise.stop(t+0.5);
    ambientNodes = null;
  }
}
function startAlarm(){
  if(!soundOn || alarmNode) return;
  const ctx = ensureCtx();
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type='sawtooth'; g.gain.value=0.05;
  o.connect(g); g.connect(ctx.destination);
  o.start();
  let dir = 1, freq = 400;
  const iv = setInterval(()=>{
    freq += dir*40;
    if(freq>=800){ dir=-1; } if(freq<=400){ dir=1; }
    o.frequency.setValueAtTime(freq, ctx.currentTime);
  }, 60);
  alarmNode = { o, g, iv };
}
function stopAlarm(){
  if(alarmNode){
    clearInterval(alarmNode.iv);
    alarmNode.g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.2);
    alarmNode.o.stop(audioCtx.currentTime+0.4);
    alarmNode = null;
  }
}

const winStates = {};

document.querySelectorAll('.win-title').forEach(title=>{
  const winId = title.dataset.win;
  const win = document.getElementById(winId);
  let dragging = false, offX=0, offY=0, ghosts=[], lastGhostTime=0;

  title.addEventListener('mousedown', (e)=>{
    if(e.target.closest('.win-btn')) return;
    if(win.classList.contains('maximized')) return;
    dragging = true;
    const rect = win.getBoundingClientRect();
    offX = e.clientX - rect.left; offY = e.clientY - rect.top;
    win.style.right='auto'; win.style.bottom='auto';
    win.style.left=rect.left+'px'; win.style.top=rect.top+'px';
    document.body.style.userSelect='none';
  });

  document.addEventListener('mousemove', (e)=>{
    if(!dragging) return;
    let x = e.clientX - offX, y = e.clientY - offY;
    const maxY = window.innerHeight - 200 - 30;
    y = Math.max(36, Math.min(y, maxY));
    x = Math.max(0, Math.min(x, window.innerWidth - 60));

    const now = performance.now();
    if(now - lastGhostTime > 70){
      lastGhostTime = now;
      const ghost = document.createElement('div');
      ghost.className = 'win-ghost';
      const r = win.getBoundingClientRect();
      ghost.style.left = r.left+'px'; ghost.style.top = r.top+'px';
      ghost.style.width = r.width+'px'; ghost.style.height = r.height+'px';
      document.getElementById('stage').appendChild(ghost);
      ghosts.unshift(ghost);
      if(ghosts.length>4){ const old = ghosts.pop(); old.remove(); }
      const ghostOpacities = [0.35, 0.2, 0.1, 0.05];
      ghosts.forEach((g,i)=>{ g.style.opacity = String(ghostOpacities[i] ?? 0.05); });
      setTimeout(()=>{ ghost.style.transition='opacity 0.4s'; ghost.style.opacity='0'; setTimeout(()=>{ ghost.remove(); const idx=ghosts.indexOf(ghost); if(idx>-1) ghosts.splice(idx,1); },400); }, 400);
    }

    win.style.left = x+'px'; win.style.top = y+'px';
  });

  document.addEventListener('mouseup', ()=>{
    dragging=false; document.body.style.userSelect='';
    ghosts.forEach(g=>g.remove()); ghosts=[];
  });
});

/* ===================== RENDER NEXUS + RADAR ===================== */
function drawRadar(canvasId, values){
  const size = 130, cx = size/2, cy = size/2, r = 48;
  const axes = 4;
  const pts = values.map((v,i)=>{
    const angle = (Math.PI*2*i/axes) - Math.PI/2;
    const rad = (v/100)*r;
    return [cx + rad*Math.cos(angle), cy + rad*Math.sin(angle)];
  });
  const gridLines = [1,0.66,0.33].map(f=>{
    return Array.from({length:axes}).map((_,i)=>{
      const angle = (Math.PI*2*i/axes) - Math.PI/2;
      return [cx + r*f*Math.cos(angle), cy + r*f*Math.sin(angle)].join(',');
    }).join(' ');
  });
  const axisLines = Array.from({length:axes}).map((_,i)=>{
    const angle = (Math.PI*2*i/axes) - Math.PI/2;
    return `<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(angle)}" y2="${cy+r*Math.sin(angle)}" stroke="#2D2D2D" stroke-width="1"/>`;
  }).join('');
  const polygon = pts.map(p=>p.join(',')).join(' ');
  const labels = ['VIG','LAT','THR','INT'];
  const labelEls = axes ? Array.from({length:axes}).map((_,i)=>{
    const angle = (Math.PI*2*i/axes) - Math.PI/2;
    const lx = cx + (r+14)*Math.cos(angle), ly = cy + (r+14)*Math.sin(angle);
    return `<text x="${lx}" y="${ly}" fill="#CCCCCC" font-size="7" font-family="JetBrains Mono" text-anchor="middle">${labels[i]}</text>`;
  }).join('') : '';

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${gridLines.map(g=>`<polygon points="${g}" fill="none" stroke="#2D2D2D" stroke-width="1"/>`).join('')}
    ${axisLines}
    <polygon points="${polygon}" fill="rgba(157,0,255,0.35)" stroke="#9D00FF" stroke-width="1.5"/>
    ${labelEls}
  </svg>`;
}

function renderAgents(){
  const body = document.getElementById('nexusBody');
  body.innerHTML = agents.map(a=>{
    const radar = drawRadar(a.name, [a.vigor, 100-a.latencia, a.throughput, a.integridad]);
    return `
    <div class="agent-card">
      <span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>
      <div class="name">${a.name}</div>
      <div class="ver">v1.0</div>
      <div class="agent-status"><span class="dot ${a.status}"></span> ${a.status.toUpperCase()}</div>

}

/* ===================== RENDER AEGIS (5 anillos) ===================== */
let currentAegis = 100;
let aegisBlinkTimer = null;
function renderAegis(){
  const pct = Math.round(agents.reduce((s,a)=>s+a.vigor,0)/agents.length);
  currentAegis = pct;
  const pctEl = document.getElementById('aegisPct');
  pctEl.textContent = pct + '%';

  const color = pct >= 90 ? '#00FF41' : pct >= 50 ? '#FFD500' : '#FF0033';
  pctEl.style.color = color;

  clearTimeout(aegisBlinkTimer);
  if(pct < 90){
    (function erraticBlink(){
      pctEl.style.textShadow = (Math.random() > 0.4) ? `0 0 12px ${color}` : '0 0 2px transparent';
      aegisBlinkTimer = setTimeout(erraticBlink, 150 + Math.random()*350);
    })();
  } else {
    pctEl.style.textShadow = `0 0 12px ${color}`;
  }

  const opacities = [0.9, 0.85, 0.8, 0.75, 0.7];
  const colors = ['#00FF41','#7CFF00','#FFD500','#FF9900','#FF0033'];
  const svg = document.getElementById('aegisRings');
  const cx=75, cy=75;
  const irregularDash = "15 8 20 12 10 6";
  let html = '<g id="aegisGroup">';
  for(let i=0;i<5;i++){
    const r = [20,31,42,53,64][i];
    const circumference = 2*Math.PI*r;
    const isFragmentable = (i === 2 || i === 3);
    const broken = pct < 90 && isFragmentable;
    const dash = broken ? irregularDash : circumference;
    html += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[i]}" stroke-width="3"
      stroke-dasharray="${dash}" opacity="${opacities[i]}" style="transition:stroke-dasharray 0.5s;"/>`;
  }
  html += '</g>';
  svg.innerHTML = html;
  svg.querySelector('#aegisGroup').classList.toggle('ring-shake', pct < 50);

  checkAutoCrisis(pct);
  return pct;
}
renderAegis();

const styleShake = document.createElement('style');
styleShake.textContent = `@keyframes ringshake{0%,100%{transform:translate(0,0);}25%{transform:translate(1px,-1px);}50%{transform:translate(-1px,1px);}75%{transform:translate(1px,1px);}} .ring-shake{animation:ringshake 0.15s linear infinite; transform-origin:75px 75px;}`;

/* ===================== MODO EMERGENCIA ===================== */
function setCrisis(on, auto){
  crisisMode = on;
  crisisAuto = !!auto;
  document.body.classList.toggle('crisis', on);
  if(on){ if(soundOn) startAlarm(); }
  else{ stopAlarm(); }
}
function checkAutoCrisis(pct){
  const offlineCount = agents.filter(a=>a.status==='offline').length;
  const shouldAuto = pct < 50 || offlineCount >= 2;
  if(shouldAuto && !crisisMode){
    setCrisis(true, true);
  } else if(crisisMode && crisisAuto && pct >= 70 && offlineCount < 2){
    setCrisis(false, false);
  }
}

/* ===================== FLUX (cascada con glitch de entrada) ===================== */
const fluxBody = document.getElementById('fluxBody');
const typeClassMap = { AGENT:'type-agent', MISSION:'type-mission', ALERT:'type-alert' };

function addFluxEvent(evt){
  const line = document.createElement('div');
  line.className = 'flux-line';
  const typeSpan = `<span class="${typeClassMap[evt.type]||''}">${evt.type}</span>`;
  line.innerHTML = `<span class="ts">[${evt.ts}]</span> ${typeSpan} · ${evt.msg}`;

  line.style.transform = 'translateX(-18px)';
  line.style.opacity = '0.3';
  fluxBody.insertBefore(line, fluxBody.firstChild);
  requestAnimationFrame(()=>{
    line.style.transition = 'transform 200ms cubic-bezier(0.2,0.0,0.0,1.0), opacity 200ms cubic-bezier(0.2,0.0,0.0,1.0)';
    line.style.transform = 'translateX(0)';
    line.style.opacity = '1';
  });

  if(evt.type === 'ALERT'){
    line.querySelector('.type-alert').style.animation = 'alert-blink 0.5s steps(1) infinite';
  }

  wrapCharsForFlicker(line);

  while(fluxBody.children.length > 12){ fluxBody.removeChild(fluxBody.lastChild); }
}

const flickerRegistry = [];
function wrapCharsForFlicker(line){
  Array.from(line.childNodes).forEach(node=>{
    if(node.nodeType === 3 && node.textContent.trim()){
      const frag = document.createDocumentFragment();
      node.textContent.split('').forEach(ch=>{
        const span = document.createElement('span');
        span.textContent = ch;
        frag.appendChild(span);
      });
      node.replaceWith(frag);
    }
  });
  flickerRegistry.push(line);
  if(flickerRegistry.length > 12) flickerRegistry.shift();
}

function globalCharFlickerLoop(){
  const delay = 300 + Math.random()*200;
  setTimeout(()=>{
    if(flickerRegistry.length){
      const line = flickerRegistry[Math.floor(Math.random()*flickerRegistry.length)];
      if(line.isConnected){
        const spans = line.querySelectorAll('span');
        if(spans.length){
          const span = spans[Math.floor(Math.random()*spans.length)];
          span.style.opacity = '0.3';
          setTimeout(()=>{ span.style.opacity = '1'; }, 150);
        }
      }
    }
    globalCharFlickerLoop();
  }, delay);
}
globalCharFlickerLoop();

/* ===================== TERMINAL ===================== */
const termOutput = document.getElementById('termOutput');
const termInput = document.getElementById('termInput');
const suggestLine = document.getElementById('suggestLine');
let history = [], historyIdx = -1;

function printOutput(text, cls){
  const div = document.createElement('div');
  div.className = 'sweep-line' + (cls?(' '+cls):'');
  div.textContent = text;
  termOutput.appendChild(div);
  termOutput.scrollTop = termOutput.scrollHeight;
}
function printEcho(cmd){
  const div = document.createElement('div');
  div.className = 'cmd-echo';
  div.innerHTML = `<span class="prompt">&gt;</span> ${cmd}`;
  termOutput.appendChild(div);
  termOutput.scrollTop = termOutput.scrollHeight;
}

const commandNames = ['help','nexus','deck','flux','aegis','clear','whoami','contact','time','alert','alert off'];

const commands = {
  help(){
    printOutput('COMANDOS DISPONIBLES:');
    printOutput('  help       - muestra esta lista');
    printOutput('  nexus      - estado de los agentes');
    printOutput('  deck       - misiones pendientes');
    printOutput('  flux       - feed de eventos');
    printOutput('  aegis      - porcentaje de integridad');
    printOutput('  clear      - limpia la terminal');
    printOutput('  whoami     - identidad del operador');
    printOutput('  contact    - información de contacto');
    printOutput('  time       - hora actual del sistema');
    printOutput('  alert      - activa modo emergencia');
    printOutput('  alert off  - desactiva modo emergencia');
  },
  nexus(){
    playScanner();
    agents.forEach(a=>{
      printOutput(`${a.name.padEnd(14)} [${a.status.toUpperCase().padEnd(7)}] vigor:${a.vigor}% lat:${a.latencia} thr:${a.throughput} int:${a.integridad}`);
    });
  },
  deck(){
    playScanner();
    missions.forEach(m=>{
      printOutput(`${m.id.padEnd(5)} ${m.agent.padEnd(14)} ${m.action.padEnd(18)} ${m.status}`);
    });
  },
  flux(){
    events.forEach(e=>{ printOutput(`[${e.ts}] ${e.type} · ${e.msg}`); });
  },
  aegis(){ printOutput(`INTEGRIDAD DE AGENTES: ${currentAegis}%`); },
  clear(){ termOutput.innerHTML=''; },
  whoami(){ printOutput('NEXUS operator // Alone'); },
  contact(){ printOutput('alonex_x.com@proton.me'); },
  time(){ printOutput(nowTs()); },
  'alert'(){
    setCrisis(true, false);
    printOutput('>> MODO EMERGENCIA ACTIVADO MANUALMENTE');
  },
  'alert off'(){
    setCrisis(false, false);
    printOutput('>> MODO EMERGENCIA DESACTIVADO');
  }
};

function runCommand(raw){
  const cmd = raw.trim().toLowerCase();
  printEcho(raw);
  firePulse();
  if(!cmd) return;
  if(commands[cmd]){
    commands[cmd]();
  } else {
    printOutput(`comando no reconocido: ${cmd} (escribe 'help')`);
  }
  if(cmd){
    history.push(raw);
    if(history.length>50) history.shift();
  }
  historyIdx = history.length;
}

printOutput('NEXUS TERMINAL v2.6 — sistema iniciado.');
printOutput("escribe 'help' para ver los comandos disponibles.");

termInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    const val = termInput.value;
    termInput.value = '';
    suggestLine.textContent = '';
    runCommand(val);
    return;
  }
  if(e.key === 'Tab'){
    e.preventDefault();
    const val = termInput.value.trim().toLowerCase();
    if(!val) return;
    const matches = commandNames.filter(c=>c.startsWith(val));
    if(matches.length === 1){
      termInput.value = matches[0];
      suggestLine.textContent = '';
    } else if(matches.length > 1){
      suggestLine.textContent = matches.join('   ');
    }
    return;
  }
  if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(history.length===0) return;
    historyIdx = Math.max(0, historyIdx-1);
    termInput.value = history[historyIdx] || '';
    return;
  }
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(history.length===0) return;
    historyIdx = Math.min(history.length, historyIdx+1);
    termInput.value = history[historyIdx] || '';
    return;
  }
  playClick();
});

termInput.addEventListener('input', ()=>{
  termInput.style.textShadow = '0 0 8px rgba(0,255,65,0.9)';
  clearTimeout(termInput._fadeT);
  termInput._fadeT = setTimeout(()=>{ termInput.style.transition='text-shadow 1s'; termInput.style.textShadow='0 0 0 rgba(0,255,65,0)'; }, 30);

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.win') && !e.target.closest('.top-bar') && !e.target.closest('.taskbar')){
    termInput.focus();

let alertFired = false;
document.addEventListener('click', function firstInteract(){
  if(alertFired) return;
  const hasOffline = agents.some(a=>a.status==='offline');
  if(hasOffline){ alertFired = true; setTimeout(playAlert, 400); }
});

checkAutoCrisis(currentAegis);

})();
